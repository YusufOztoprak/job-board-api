services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=jobboard_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_ACCESS_SECRET=supersecretaccesskey123
      - JWT_REFRESH_SECRET=supersecretrefreshkey456
      - JWT_ACCESS_EXPIRES=1d
      - JWT_REFRESH_EXPIRES=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=jobboard_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"

volumes:
  postgres_data: